<html>
    <head>
        <title>AccessBridge</title>
        <link rel="stylesheet" href="./switch.css">
        <link rel="stylesheet" href="./popup.css">
        <link rel="stylesheet" href="./modal.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    </head>
    <body>
        <h1>
            <span class="brandMark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 3.5L14.3 9.7L20.5 12L14.3 14.3L12 20.5L9.7 14.3L3.5 12L9.7 9.7L12 3.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M18.8 3.6V7.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M17 5.4H20.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <circle cx="4.7" cy="18.8" r="1.2" fill="currentColor"></circle>
                </svg>
            </span>
            <span>AccessBridge</span>
        </h1>
        <!--
        switch copy
        <label class="switch">
            <input type="checkbox">
            <span class="slider round"></span>
        </label>

        toggleCheckbox copy
        <label class="toggleCheckbox large">
            Example Toggle
            <input type="checkbox">
        </label>
        -->

        <div>

            <p class="large">
                <strong class="sectionTitle"> 
                    <span>Font Size</span>
                    <i class="material-icons">format_size</i>
                </strong>
            </p>

            <label for="font-size-slider">Font size</label>
            <input type="range" name="font-size-slider" min="12" max="50" value="18">

        </div>
        <div>
            
            <p class="large">
                <strong class="sectionTitle"> 
                    <span>Color Style</span>
                    <i class="material-icons">format_color_fill</i>
                </strong>
            </p>
            <button id="myBtn" class="large">
                <span>Select Style</span>
                <i class="material-icons">palette</i>
            </button>

        </div>
        <br>
        <div>
            
            <button class="toggleButton large">
                <strong class="buttonLabel">
                    <span>Contrast Mode</span>
                    <i class="material-icons">remove_red_eye</i>
                </strong>
            </button>
            <button class="toggleButton large">
                <strong class="buttonLabel">
                    <span>Dyslexia Mode</span>
                    <i class="material-icons">chrome_reader_mode</i>
                </strong>
            </button>

        </div>
        
        <p class="large">
            <strong class="sectionTitle">
                <span>Accessiblity</span>
                <i class="material-icons">accessibility</i>
            </strong>
        </p>

        <label class="toggleCheckbox large">
            <span class="buttonLabel">
                <span>Picture to Speech</span>
                <i class="material-icons">image</i>
            </span>
            <input type="checkbox">
        </label>
        <label class="toggleCheckbox large">
            <span class="buttonLabel">
                <span>Text to Speech</span>
                <i class="material-icons">volume_up</i>
            </span>
            <input type="checkbox">
        </label>
        <label class="toggleCheckbox large">
            <span class="buttonLabel">
                <span>Line Reader</span>
                <i class="material-icons">view_headline</i>
            </span>
            <input type="checkbox">
        </label>

        <div id="myModal" class="modal">

            <!-- Modal content -->
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3>Background Colors</h3>
                <div class="buttonsContainer">
                    <button class="colorButton" style="color: white; background-color: black;">White on black</button>
                    <button class="colorButton" style="color: black; background-color: white;">Black on white</button>
                    <button class="colorButton" style="color: white; background-color: red;">White on red</button>
                    <button class="colorButton" style="color: white; background-color: green;">White on green</button>
                    <button class="colorButton" style="color: white; background-color: blue;">White on blue</button>
                    <button class="colorButton" style="color: black; background-color: yellow;">Black on yellow</button>
                    <button class="colorButton" style="color: yellow; background-color: black;">Yellow on black</button>
                </div>
            </div>

        </div>

        <script src="./popup.js"></script>

    </body>
</html>
